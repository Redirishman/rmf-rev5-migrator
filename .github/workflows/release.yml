name: Release artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-artifacts:
    name: Build Lambda zips + frontend bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Build Lambda package
        run: |
          cd backend
          make build   # produces build/rmf-migrator-lambda.zip

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Build frontend bundle
        run: |
          cd frontend
          npm ci
          npm run build
          cd dist && zip -r ../../frontend-bundle.zip . && cd ../..

      - name: Extract changelog notes for this tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v start="## [$version]" '
            index($0, start) == 1 { grab = 1 }
            grab && $0 ~ /^## \[/ && index($0, start) != 1 { exit }
            grab { print }
          ' CHANGELOG.md | tail -n +2 | sed '/./,$!d' > RELEASE_NOTES.md
          printf '\n**Full Changelog:** https://github.com/%s/commits/%s\n' \
            "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME" >> RELEASE_NOTES.md
          [ -s RELEASE_NOTES.md ] || echo "Release $GITHUB_REF_NAME" > RELEASE_NOTES.md

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            backend/build/rmf-migrator-lambda.zip
            frontend-bundle.zip
          # Notes come from CHANGELOG.md (see previous step), not GitHub's
          # auto-generated PR summary, which re-appends a "What's Changed"
          # section on every workflow run.
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
